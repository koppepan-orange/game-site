<html lang="ja">
<head>

    <link rel="stylesheet" href="mitame.css">
    <title>ナイチンゲールの配信ゲーム</title>
</head>
<body>

    <iframe class="camo"></iframe>
    <div class="camoon"></div>
    <div id="main">

        <div class="space" id="home"></div>
        <div class="space" id="tet">
            <div class="row">
                <canvas class="hontai"></canvas>

                <div class="column">
                    <div class="mono score" class="ui">score: 0</div>


                    <div class="mono jkTog-oya">
                    </div>

                    <div class="mono controll">
                        <div class="bts">

                            <div class="bt left">く</div> <div class="bt none"></div> <div class="bt right">D</div>

        <div id="footer">

    <!-- <script src="data.js" defer></script> -->
    <!-- <script src="nakami.js" defer></script> -->

    <script>
        (async() => {
            let ts = new Date().getTime(); 

            let ZettaiTukawarenaiKannsuu = async (f) => {
                return new Promise(res => {
                    let script = document.createElement('script');
                    script.src = `${f}.js?v=${ts}`;
                    script.defer = true;
                    script.onload = res;
                    document.head.appendChild(script);
                });        
            }
            await ZettaiTukawarenaiKannsuu(`data`);
            await ZettaiTukawarenaiKannsuu(`nakami`);
        })();
    </script>
</body>
