<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="mitame.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.6.8/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.6.8/firebase-database.js"></script>
    <title>スターターパック</title>
</head>
<body>
    <div id="mobileDesc"></div>
    <div id="log" class="hid">
        <div class="opener"><</div>
        <div class="main"></div>
        <div class="text"></div>
    </div>
    <div id="tenshee">
        <div class="disp"></div>
        <div class="bts">
            <div class="bt num" data-num="1">1</div>  <div class="bt num" data-num="2">2</div> <div class="bt num" data-num="3">3</div>
            <div class="bt num" data-num="4">4</div>  <div class="bt num" data-num="5">5</div> <div class="bt num" data-num="6">6</div>
            <div class="bt num" data-num="7">7</div>  <div class="bt num" data-num="8">8</div> <div class="bt num" data-num="9">9</div>
            <div class="bt del">←</div> <div class="bt num" data-num="0">0</div> <div class="bt ok">OK</div>
        </div>
    </div>
    <div id="movlis">
        <div class="title">Move List</div>
        <div class="list"></div>
    </div>

    <div id="main">

        <div id="login" class="space">
            <div class="column">
                <input type="text" class="input username" placeholder="ユーザー名" required>
                <input type="password" class="input password" placeholder="パスワード" required>
                <div class="bt send">ログイン</div>
            </div>
            
            <div class="acs">
                <div class="tog"></div>
                <div class="list"></div>
            </div>

            <div class="dolphin">
                <div class="fuki">
                    <div class="text">お前を消す方法</div>
                </div>
                <div class="img">
                    <img src="assets/images/systems/dolphin.png">
                </div>
            </div>
        </div>

        <div class="space" id="loby">
            <div class="unit1">
                <div class="make botan">部屋の作成</div>
                <div class="join botan">部屋に参加</div>
            </div>
        </div>
        

        <div class="space" id="wait">
            <div class="barrel">
                <div class="upper">
                    <div class="name">namae</div>
                    <div class="pass">5081</div>
                </div>
                
                <div class="body">
                    <div class="list"></div>
                </div>

                <div class="rules">
                    <div class="check">ルールを確認する</div>
                    <div class="setting hid">ルールを変更する</div>
                </div>
            </div>
        </div>

    </div>
    
    <!-- <script src="data.js" defer></script> -->
    <!-- <script src="nakami.js" defer></script> -->

    <script>
        (async() => {
            let ts = new Date().getTime(); 

            let ZettaiTukawarenaiKannsuu = async (f) => {
                return new Promise(res => {
                    let script = document.createElement('script');
                    script.src = `${f}.js?v=${ts}`;
                    script.defer = true;
                    script.onload = res;
                    document.head.appendChild(script);
                });        
            }
            await ZettaiTukawarenaiKannsuu(`data`);
            await ZettaiTukawarenaiKannsuu(`nakami`);
        })();
    </script>
</body>
</html>
