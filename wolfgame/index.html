<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="mitame.css">
    <title>スターターパック</title>
</head>
<body>
    <div id="mobileDesc"></div>
    <div id="log" class="hid">
        <div class="opener"><</div>
        <div class="main"></div>
        <div class="text"></div>
    </div>
    <div id="movlis">
        <div class="title">Move List</div>
        <div class="list"></div>
    </div>

    <div id="main">

        <div class="space" id="loby">
            <div class="unit1">
                <div class="make botan">部屋の作成</div>
                <div class="join botan">部屋に参加</div>
            </div>
        </div>
        

        <div class="space" id="wait">
            <div class="upper">
                <div class="name">namae</div>
                <div class="pass">5081</div>
            </div>
            
            <div class="body">

            </div>

            <div class="rules">

            </div>
        </div>

    </div>
    
    <!-- <script src="data.js" defer></script> -->
    <!-- <script src="nakami.js" defer></script> -->

    <script>
        (async() => {
            let ts = new Date().getTime(); 

            let ZettaiTukawarenaiKannsuu = async (f) => {
                return new Promise(res => {
                    let script = document.createElement('script');
                    script.src = `${f}.js?v=${ts}`;
                    script.defer = true;
                    script.onload = res;
                    document.head.appendChild(script);
                });        
            }
            await ZettaiTukawarenaiKannsuu(`data`);
            await ZettaiTukawarenaiKannsuu(`nakami`);
        })();
    </script>
</body>
