<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>✨ Voxel Craft Lite ✨</title>
    <style>
        /* ===== リセット & ベース ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            font-family: 'Segoe UI', 'Misaki', sans-serif;
            background: #111;
        }
        #game-container {
            width: 100%;
            height: 100%;
            position: relative;
        }
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            text-shadow: 2px 2px 0 #000;
            font-size: 14px;
            background: rgba(0,0,0,0.5);
            padding: 6px 12px;
            border-radius: 30px;
            backdrop-filter: blur(4px);
            pointer-events: none;
            z-index: 10;
        }
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 20px;
            height: 20px;
            pointer-events: none;
            z-index: 20;
        }
        #crosshair::before, #crosshair::after {
            content: '';
            position: absolute;
            background: rgba(255,255,255,0.9);
            box-shadow: 0 0 4px #000;
        }
        #crosshair::before { top: 9px; left: 0; width: 20px; height: 2px; }
        #crosshair::after  { top: 0; left: 9px; width: 2px; height: 20px; }

        /* ===== カラーパレット ===== */
        #palette {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 12px;
            padding: 12px 24px;
            background: rgba(20,20,30,0.8);
            backdrop-filter: blur(8px);
            border-radius: 60px;
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            z-index: 100;
            transition: opacity 0.2s, transform 0.2s;
            pointer-events: none;
            opacity: 0;
            transform: translateX(-50%) translateY(20px);
        }
        #palette.visible {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
            pointer-events: auto;
        }
        .color-swatch {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: 3px solid rgba(255,255,255,0.5);
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            cursor: pointer;
            transition: 0.1s;
        }
        .color-swatch:hover {
            transform: scale(1.15);
            border-color: white;
        }
        .color-swatch.active {
            border-color: gold;
            box-shadow: 0 0 20px gold;
            transform: scale(1.1);
        }
        #custom-color-btn {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: conic-gradient(red, yellow, lime, cyan, blue, magenta, red);
            border: 3px solid white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
            color: white;
            text-shadow: 0 0 6px black;
        }
        #custom-color-picker {
            position: absolute;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            display: none;
        }

        /* デバッグ表示 */
        #debug-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.6);
            color: #0f0;
            padding: 10px;
            font-family: monospace;
            font-size: 12px;
            border-radius: 8px;
            display: none;
            z-index: 200;
            pointer-events: none;
        }

        /* テレポートメニュー */
        #tp-menu {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.7);
            padding: 20px;
            border-radius: 20px;
            display: none;
            flex-direction: row;
            gap: 20px;
            z-index: 300;
            color: white;
        }
        .tp-item {
            padding: 10px 20px;
            background: #333;
            border-radius: 12px;
            cursor: pointer;
        }
        .tp-item.selected {
            background: #0af;
        }

        /* その他 */
        .notice {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: #aaa;
            font-size: 12px;
            z-index: 15;
        }
    </style>
</head>
<body>
<div id="game-container">
    <div id="info">🎮 WASD:移動 | Space:ジャンプ | 左:破壊 右:設置 | E:カラーパレット</div>
    <div id="crosshair"></div>
    <div id="debug-panel"></div>
    
    <!-- カラーパレット -->
    <div id="palette">
        <!-- JSで生成 -->
    </div>
    <input type="color" id="custom-color-picker" value="#ff66aa">

    <!-- テレポートメニュー (Rキー) -->
    <div id="tp-menu">
        <div class="tp-item" data-tp="0">🏠 原点</div>
        <div class="tp-item" data-tp="1">🌲 コース1</div>
        <div class="tp-item" data-tp="2">🏔️ コース2</div>
    </div>
    <div class="notice">🖱️ クリックで操作開始 | Eで色選択</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<!-- 補助関数は内製、OBJ/MTLは使わないので削除 -->

<script>
    (function(){
        "use strict";

        // ---------- ユーティリティ (一部抜粋) ----------
        function random(min,max){ return Math.floor(Math.random()*(max-min+1))+min; }
        function irohaRan(){ return '#'+Math.floor(Math.random()*16777215).toString(16).padStart(6,'0'); }
        function hoshoku(hex){
            let r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
            return '#'+(255-r).toString(16).padStart(2,'0')+(255-g).toString(16).padStart(2,'0')+(255-b).toString(16).padStart(2,'0');
        }

        // ---------- 初期化 ----------
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB); // スカイブルー
        
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        camera.position.set(5, 10, 15);
        camera.rotation.order = 'YXZ';
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true; // 影はオフ(軽量化) 必要ならオン
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.getElementById('game-container').appendChild(renderer.domElement);

        // ライト
        const ambientLight = new THREE.AmbientLight(0x404060, 0.55);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xfff5d1, 1.2);
        dirLight.position.set(20, 30, 10);
        dirLight.castShadow = true;
        dirLight.receiveShadow = true;
        dirLight.shadow.mapSize.width = 1024;
        dirLight.shadow.mapSize.height = 1024;
        const d = 30;
        dirLight.shadow.camera.left = -d;
        dirLight.shadow.camera.right = d;
        dirLight.shadow.camera.top = d;
        dirLight.shadow.camera.bottom = -d;
        dirLight.shadow.camera.near = 1;
        dirLight.shadow.camera.far = 50;
        dirLight.shadow.bias = -0.001;
        scene.add(dirLight);
        
        const fillLight = new THREE.PointLight(0x4466ff, 0.5);
        fillLight.position.set(-10, 10, 20);
        scene.add(fillLight);

        // 床 (グリッド付き)
        const floorMat = new THREE.MeshStandardMaterial({ color: 0x8a9aa8, roughness: 0.7, metalness: 0.1 });
        const floorGeo = new THREE.BoxGeometry(40, 1, 40);
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.position.y = -0.5;
        floor.receiveShadow = true;
        floor.name = 'floor';
        floor.userData.touchable = true;
        scene.add(floor);
        
        const gridHelper = new THREE.GridHelper(40, 20, 0x335577, 0x224466);
        gridHelper.position.y = 0.01;
        scene.add(gridHelper);

        // プレイヤー設定
        const player = {
            height: 1.8,
            radius: 0.4,
            speed: 5.0,
            jumpStrength: 7.0,
            gravity: 18.0,
            grounded: false,
            vel: new THREE.Vector3(),
            onGround: false
        };
        const keyState = {};
        let isPointerLocked = false;
        let moveX = 0, moveY = 0;
        const maxPitch = Math.PI/2.4;
        
        // ブロック管理
        const blockGroup = new THREE.Group();
        scene.add(blockGroup);
        const blocks = []; // 衝突判定用 { mesh, aabb min/max }
        
        // 現在の選択色
        let currentColor = '#ffaa00';
        
        // パレット用 基本色
        const presetColors = [
            '#ff595e', '#ffca3a', '#8ac926', '#1982c4', '#6a4c93',
            '#ffffff', '#aaaaaa', '#555555', '#f4a261', '#e76f51',
            '#2a9d8f', '#e9c46a'
        ];

        // ---------- カラーパレット構築 ----------
        const paletteDiv = document.getElementById('palette');
        const picker = document.getElementById('custom-color-picker');
        
        function createPalette() {
            presetColors.forEach(hex => {
                const swatch = document.createElement('div');
                swatch.className = 'color-swatch';
                swatch.style.backgroundColor = hex;
                swatch.addEventListener('click', () => {
                    currentColor = hex;
                    updateActiveSwatch();
                    picker.value = hex;
                });
                paletteDiv.appendChild(swatch);
            });
            
            // カスタムボタン
            const customBtn = document.createElement('div');
            customBtn.id = 'custom-color-btn';
            customBtn.textContent = '🎨';
            customBtn.addEventListener('click', () => {
                picker.click();
            });
            paletteDiv.appendChild(customBtn);
            
            picker.addEventListener('input', (e) => {
                currentColor = e.target.value;
                updateActiveSwatch();
            });
            picker.addEventListener('change', (e) => {
                currentColor = e.target.value;
            });
            
            updateActiveSwatch();
        }
        function updateActiveSwatch() {
            document.querySelectorAll('.color-swatch').forEach(el => {
                el.classList.remove('active');
                if (el.style.backgroundColor === currentColor) el.classList.add('active');
            });
        }
        createPalette();

        // テレポート位置
        const tpPositions = [
            { x:5, y:5, z:10 },
            { x:-10, y:8, z:-5 },
            { x:15, y:12, z:-12 }
        ];
        
        // ---------- 衝突判定用 AABB 取得 ----------
        function getBlockAABB(mesh) {
            const pos = mesh.position;
            const size = mesh.geometry.parameters.width; // すべて立方体と仮定
            return {
                min: new THREE.Vector3(pos.x - size/2, pos.y - size/2, pos.z - size/2),
                max: new THREE.Vector3(pos.x + size/2, pos.y + size/2, pos.z + size/2)
            };
        }

        // ブロック追加
        function addBlock(x, y, z, color) {
            const size = 1.0;
            const geometry = new THREE.BoxGeometry(size, size, size);
            const material = new THREE.MeshStandardMaterial({ color: color, roughness: 0.4 });
            const mesh = new THREE.Mesh(geometry, material);
            mesh.position.set(x, y, z);
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            mesh.userData.touchable = true;
            blockGroup.add(mesh);
            
            const aabb = getBlockAABB(mesh);
            blocks.push({ mesh, aabb });
            return mesh;
        }
        
        function removeBlock(mesh) {
            const idx = blocks.findIndex(b => b.mesh === mesh);
            if (idx !== -1) blocks.splice(idx, 1);
            blockGroup.remove(mesh);
        }

        // 初期サンプルブロック数個（デモ用）
        addBlock(2, 0.5, 2, '#8ac926');
        addBlock(-1, 0.5, 3, '#1982c4');
        addBlock(0, 1.5, 0, '#ffca3a');

        // ---------- 衝突解決 (カプセル vs AABB) ----------
        function resolveCollision(deltaTime) {
            const pos = camera.position;
            const vel = player.vel.clone();
            
            // 重力
            if (!player.grounded) vel.y -= player.gravity * deltaTime;
            
            // 移動量
            let moveX = vel.x * deltaTime;
            let moveY = vel.y * deltaTime;
            let moveZ = vel.z * deltaTime;
            
            const capsuleBottom = pos.y - player.height/2 + player.radius;
            const capsuleTop = pos.y + player.height/2 - player.radius;
            
            // X軸
            pos.x += moveX;
            let collision = false;
            for (let b of blocks) {
                const aabb = b.aabb;
                const closestX = Math.max(aabb.min.x, Math.min(pos.x, aabb.max.x));
                const closestZ = Math.max(aabb.min.z, Math.min(pos.z, aabb.max.z));
                const dx = pos.x - closestX;
                const dz = pos.z - closestZ;
                const dist = Math.sqrt(dx*dx + dz*dz);
                
                // 垂直方向の重なりチェック
                const vertOverlap = (capsuleBottom < aabb.max.y && capsuleTop > aabb.min.y);
                if (vertOverlap && dist < player.radius) {
                    const overlap = player.radius - dist;
                    if (dist > 0.001) {
                        pos.x += (dx / dist) * overlap;
                    } else {
                        pos.x += player.radius;
                    }
                    vel.x = 0;
                    collision = true;
                }
            }
            
            // Z軸
            pos.z += moveZ;
            for (let b of blocks) {
                const aabb = b.aabb;
                const closestX = Math.max(aabb.min.x, Math.min(pos.x, aabb.max.x));
                const closestZ = Math.max(aabb.min.z, Math.min(pos.z, aabb.max.z));
                const dx = pos.x - closestX;
                const dz = pos.z - closestZ;
                const dist = Math.sqrt(dx*dx + dz*dz);
                const vertOverlap = (capsuleBottom < aabb.max.y && capsuleTop > aabb.min.y);
                if (vertOverlap && dist < player.radius) {
                    const overlap = player.radius - dist;
                    if (dist > 0.001) {
                        pos.z += (dz / dist) * overlap;
                    } else {
                        pos.z += player.radius;
                    }
                    vel.z = 0;
                    collision = true;
                }
            }
            
            // Y軸 (重力・ジャンプ)
            pos.y += moveY;
            let grounded = false;
            const footY = pos.y - player.height/2;
            for (let b of blocks) {
                const aabb = b.aabb;
                if (pos.x + player.radius > aabb.min.x && pos.x - player.radius < aabb.max.x &&
                    pos.z + player.radius > aabb.min.z && pos.z - player.radius < aabb.max.z) {
                    
                    // 地面判定
                    if (vel.y <= 0 && footY <= aabb.max.y && footY + (player.height) > aabb.min.y) {
                        pos.y = aabb.max.y + player.height/2;
                        vel.y = 0;
                        grounded = true;
                    }
                    // 天井
                    if (vel.y > 0 && pos.y + player.height/2 > aabb.min.y && pos.y - player.height/2 < aabb.max.y) {
                        pos.y = aabb.min.y - player.height/2;
                        vel.y = 0;
                    }
                }
            }
            // 床との接地
            if (footY <= 0.01) {
                pos.y = player.height/2;
                vel.y = 0;
                grounded = true;
            }
            
            player.grounded = grounded;
            player.vel.copy(vel);
            camera.position.copy(pos);
        }

        // ---------- 入力処理 ----------
        function handleInput(deltaTime) {
            if (!isPointerLocked) return;
            
            const forward = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion);
            forward.y = 0; forward.normalize();
            const right = new THREE.Vector3(1,0,0).applyQuaternion(camera.quaternion);
            right.y = 0; right.normalize();
            
            let moveDir = new THREE.Vector3(0,0,0);
            if (keyState['w']) moveDir.add(forward);
            if (keyState['s']) moveDir.sub(forward);
            if (keyState['a']) moveDir.sub(right);
            if (keyState['d']) moveDir.add(right);
            
            if (moveDir.lengthSq() > 0) moveDir.normalize();
            
            const speed = player.speed * (keyState['shift'] ? 1.8 : 1.0);
            player.vel.x = moveDir.x * speed;
            player.vel.z = moveDir.z * speed;
            
            if (keyState[' '] && player.grounded) {
                player.vel.y = player.jumpStrength;
                player.grounded = false;
            }
        }

        // ---------- レイキャスト (設置・破壊) ----------
        function getTargetBlock() {
            const raycaster = new THREE.Raycaster();
            raycaster.setFromCamera({ x:0, y:0 }, camera);
            const meshes = blocks.map(b => b.mesh);
            const intersects = raycaster.intersectObjects(meshes);
            if (intersects.length > 0) {
                const hit = intersects[0];
                const point = hit.point;
                const normal = hit.face.normal;
                const placePos = point.add(normal.clone().multiplyScalar(0.5)).floor().addScalar(0.5);
                return { hitMesh: hit.object, placePos };
            }
            // 床や遠距離は別途
            return null;
        }

        // ---------- イベント登録 ----------
        document.addEventListener('keydown', e => {
            const k = e.key.toLowerCase();
            keyState[k] = true;
            if (k === 'e' && isPointerLocked) {
                paletteDiv.classList.toggle('visible');
            }
            if (k === 'r') {
                document.getElementById('tp-menu').style.display = 'flex';
            }
            if (k === 'g') {
                const dbg = document.getElementById('debug-panel');
                dbg.style.display = dbg.style.display === 'none' ? 'block' : 'none';
            }
        });
        document.addEventListener('keyup', e => { keyState[e.key.toLowerCase()] = false; });
        
        document.addEventListener('mousemove', e => {
            if (!isPointerLocked) return;
            moveX -= e.movementX * 0.002;
            moveY -= e.movementY * 0.002;
            moveY = Math.max(-maxPitch, Math.min(maxPitch, moveY));
            camera.rotation.order = 'YXZ';
            camera.rotation.x = moveY;
            camera.rotation.y = moveX;
        });
        
        document.addEventListener('mousedown', e => {
            if (!isPointerLocked) {
                renderer.domElement.requestPointerLock();
                return;
            }
            const target = getTargetBlock();
            if (e.button === 0 && target && target.hitMesh) {
                removeBlock(target.hitMesh);
            } else if (e.button === 2 && target) {
                const pos = target.placePos;
                addBlock(pos.x, pos.y, pos.z, currentColor);
            }
        });
        document.addEventListener('contextmenu', e => e.preventDefault());
        
        // ポインターロック
        document.addEventListener('pointerlockchange', () => {
            isPointerLocked = !!document.pointerLockElement;
        });

        // テレポート選択
        document.querySelectorAll('.tp-item').forEach((el, idx) => {
            el.addEventListener('click', () => {
                const pos = tpPositions[idx];
                camera.position.set(pos.x, pos.y, pos.z);
                player.vel.set(0,0,0);
                document.getElementById('tp-menu').style.display = 'none';
            });
        });

        // ---------- アニメーションループ ----------
        let clock = new THREE.Clock();
        
        function animate() {
            const delta = Math.min(clock.getDelta(), 0.1);
            
            if (isPointerLocked) {
                handleInput(delta);
                resolveCollision(delta);
            }
            
            // デバッグ表示更新
            const dbg = document.getElementById('debug-panel');
            if (dbg.style.display === 'block') {
                dbg.innerHTML = `Pos: ${camera.position.x.toFixed(2)} ${camera.position.y.toFixed(2)} ${camera.position.z.toFixed(2)}<br>
                                 Vel: ${player.vel.x.toFixed(2)} ${player.vel.y.toFixed(2)} ${player.vel.z.toFixed(2)}<br>
                                 Grounded: ${player.grounded}<br> Blocks: ${blocks.length}`;
            }
            
            renderer.render(scene, camera);
            requestAnimationFrame(animate);
        }
        animate();

        // リサイズ
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // 初期クリック誘導
        renderer.domElement.addEventListener('click', () => {
            if (!isPointerLocked) renderer.domElement.requestPointerLock();
        });

        console.log('✨ 準備完了！ Eでカラーパレットを開こう！');
    })();
</script>
</body>
</html>
