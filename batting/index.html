<!DOCTYPE html>
<html lang="js">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="mitame.css">
    <title>バントすなーーーーーー</title>
</head>
<body>
    <div id="mobileDesc"></div>
    <div id="log" class="hid">
        <div class="opener"><</div>
        <div class="main"></div>
        <div class="text"></div>
    </div>
    <div id="movlis">
        <div class="title">Move List</div>
        <div class="list"></div>
    </div>

    <div id="main">

        <div class="space" id="batt">
            <canvas></canvas>
            <div class="yukkuri">
                <div class="human pit">
                    <img/>
                    <div class="text"></div>
                </div>
                <div class="human bat">
                    <img/>
                    <div class="text"></div>
                </div>
            </div>
        </div>

    </div>
    
    <!-- <script src="data.js" defer></script> -->
    <!-- <script src="nakami.js" defer></script> -->

    <script>
        (function() {
            let ts = new Date().getTime(); 

            let fs = ['data', 'nakami'];
            for(let f of fs){
                let script = document.createElement('script');
                script.src = `${f}.js?v=${ts}`;
                script.defer = true;
                document.head.appendChild(script);
            }

            let link = document.createElement('link');
            link.rel = "stylesheet";
            link.href = `mitame.css?v=${ts}`;
            link.onload = () => {
                document.body.style.visibility = "visible";
            };
            document.head.appendChild(link);
        })();
    </script>
</body>
</html>
