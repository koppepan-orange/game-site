<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="mitame.css">
    <title>何かしら捜検隊</title>
</head>
<body>
    <div id="mobileDesc"></div>
    <div id="log" class="hid">
        <div class="opener"><</div>
        <div class="main"></div>
        <div class="text"></div>
    </div>
    <div id="tenshee">
        <div class="disp"></div>
        <div class="bts">
            <div class="bt num" data-num="1">1</div>  <div class="bt num" data-num="2">2</div> <div class="bt num" data-num="3">3</div>
            <div class="bt num" data-num="4">4</div>  <div class="bt num" data-num="5">5</div> <div class="bt num" data-num="6">6</div>
            <div class="bt num" data-num="7">7</div>  <div class="bt num" data-num="8">8</div> <div class="bt num" data-num="9">9</div>
            <div class="bt del">←</div> <div class="bt num" data-num="0">0</div> <div class="bt ok">OK</div>
        </div>
    </div>
    <div id="movlis">
        <div class="title">Move List</div>
        <div class="list"></div>
    </div>
    

    <div id="main">

        <div class="space" id="home">
            なにもないわよ～ん
            <button onclick="mainF.move('stage')">これはボタンです。なつかしいね</button>
        </div>

        <div class="space" id="stage">

            <div class="sturdy">
                <div class="mono teethcar">
                    <img src="assets/images/systems/teethcar.png">
                </div>
                <div class="mono chest">
                    <img src="assets/images/systems/chest.png">
                </div>
            </div>
            
            <canvas class="canvas"></canvas>

            <div class="settle">
                <div class="body"></div>
                <div class="text">何？</div>
            </div>

            <div class="ui">

                <div class="disp">
                    <div class="u flavor">
                        <div class="title" data-description="匂いです。undertaleのアレ">香り:</div>
                        <div class="text">なし</div>
                    </div>
                    <div class="u stat">
                        <div class="title"  data-description="バフとかデバフとか？んー夢広がるね">状態:</div>
                        <div class="text">健康</div>
                    </div>
                </div>

                <div class="control">
                    <div class="bt w" data-dir="a">A</div>
                    <div class="row">
                        <div class="bt a">C</div>
                        <div class="bt d">D</div>
                    </div>
                    <div class="bt s">V</div>
                </div>

            </div>

        </div>

    </div>
    
    <!-- <script src="data.js" defer></script> -->
    <!-- <script src="nakami.js" defer></script> -->

    <script defer>
        (async() => {
            let ts = new Date().getTime(); 

            let ZettaiTukawarenaiKannsuu = async (f) => {
                return new Promise(res => {
                    let script = document.createElement('script');
                    script.src = `${f}.js?v=${ts}`;
                    script.defer = true;
                    script.onload = res;
                    document.head.appendChild(script);
                });        
            }
            await ZettaiTukawarenaiKannsuu(`data`);
            await ZettaiTukawarenaiKannsuu(`nakami`);
        })();
    </script>
</body>
</html>
