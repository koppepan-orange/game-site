<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2Dday-asoBow</title>
    <link rel="stylesheet" href="mitame.css">
    <title>スターターパック</title>
</head>
<body>
    <div id="mobileDesc"></div>
    <div id="log" class="hid">
        <div class="opener"><</div>
        <div class="main"></div>
        <div class="text"></div>
    </div>
    <div id="tenshee">
        <div class="disp"></div>
        <div class="bts">
            <div class="bt num" data-num="1">1</div>  <div class="bt num" data-num="2">2</div> <div class="bt num" data-num="3">3</div>
            <div class="bt num" data-num="4">4</div>  <div class="bt num" data-num="5">5</div> <div class="bt num" data-num="6">6</div>
            <div class="bt num" data-num="7">7</div>  <div class="bt num" data-num="8">8</div> <div class="bt num" data-num="9">9</div>
            <div class="bt del">←</div> <div class="bt num" data-num="0">0</div> <div class="bt ok">OK</div>
        </div>
    </div>
    <div id="movlis">
        <div class="title">Move List</div>
        <div class="list"></div>
    </div>
    

    <div id="main">

        <div class="space" id="game">

            <div id="debug" class="draggable">
                <div class="display">
                    <div class="d pos"></div>
                    <div class="d spd"></div>
                    <div class="d jump"></div>
                    <div class="d grd"></div>
                    <div class="d dash"></div>
                    <div class="d prop"></div>
                    <div class="d have"></div>
                </div>
                <div class="buttons"></div>
                <div class="obj"></div>
                <div class="tile"></div>
            </div>

            <canvas id="gameCanvas"></canvas>
        </div>

    </div>
    
    <!-- <script src="data.js" defer></script> -->
    <!-- <script src="nakami.js" defer></script> -->

    <script>
        (async() => {
            let ts = new Date().getTime(); 

            let ZettaiTukawarenaiKannsuu = async (f) => {
                return new Promise(res => {
                    let script = document.createElement('script');
                    script.src = `${f}.js?v=${ts}`;
                    script.defer = true;
                    script.onload = res;
                    document.head.appendChild(script);
                });        
            }
            await ZettaiTukawarenaiKannsuu(`data`);
            await ZettaiTukawarenaiKannsuu(`nakami`);
        })();
    </script>
</body>
</html>
