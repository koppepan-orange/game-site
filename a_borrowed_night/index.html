<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="迷い込んだ洋館で怪異と戦うローグライク。衝撃的な展開に、震えて眠れ━━━━">
    <meta name="keywords" content="A Borrowed Night,a_borrowed_night,a-borrowed-night,ローグライク,洋館,怪異,幽霊">
    <title>A Borrowed Night: The Manor</title>
    <link rel="stylesheet" href="mitame.css">
</head>
<body>
    <div id="mobileDesc"></div>
    <div id="log" class="hid">
        <div class="opener"><</div>
        <div class="main"></div>
        <div class="text"></div>
    </div>
    <div id="movlis">
        <div class="title">Move List</div>
        <div class="list"></div>
    </div>

    <div id="ShowCardInfo" class="hidden">開けたら閉めろぉぅ</div>
    
    <div id="main">
        
        <div class="space" id="home">
            
        </div>


        <div class="space" id="map">
            <div class="ui">
                <div class="mono sokai">
                    <img class="icon" src="assets/images/tools/sokai.png"/>
                    <div class="text"></div>
                </div>
                <div class="mono drill">
                    <img class="icon" src="assets/images/tools/drill.png"/>
                    <div class="text"></div>
                </div>
            </div>

            <div class="side">
                <div class="opener"></div>
            </div>

            <div class="container">
                <div class="coma">
                    <div class="hontai"></div>
                    <div class="before"></div>
                </div>
            </div>
        </div>

        <div class="space" id="battle">
            <div class="cardPlace"></div>

            <div class="uis"></div>

            <div class="costs"></div>
            
            <div class="cardDraw"></div>
        </div>

    </div>
    

    <!-- <script src="data.js" defer></script> -->
    <!-- <script src="nakami.js" defer></script> -->

    <script>
        (async() => {
            let ts = new Date().getTime(); 

            let ZettaiTukawarenaiKannsuu = async (f) => {
                return new Promise(res => {
                    let script = document.createElement('script');
                    script.src = `${f}.js?v=${ts}`;
                    script.defer = true;
                    script.onload = res;
                    document.head.appendChild(script);
                });        
            }
            await ZettaiTukawarenaiKannsuu(`data.js?v=${ts}`);
            await ZettaiTukawarenaiKannsuu(`nakami.js?v=${ts}`);

            let link = document.createElement('link');
            link.rel = "stylesheet";
            link.href = `mitame.css?v=${ts}`;
            link.onload = () => {
                document.body.style.visibility = "visible";
            };
            document.head.appendChild(link);
        })();
    </script>
</body>
</html>
